<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PersonalHub</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
      padding: 24px;
      background: #1a1a1a;
      color: #e0e0e0;
    }
    h1 { font-size: 22px; margin-bottom: 16px; }
    .status-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 24px;
      margin-bottom: 24px;
    }
    .status-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .status-label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
    }
    .status-value {
      font-size: 14px;
      color: #e0e0e0;
    }
    .tick-section {
      border-top: 1px solid #333;
      padding-top: 16px;
    }
    .tick-result {
      margin-top: 12px;
      padding: 12px;
      background: #222;
      border-radius: 6px;
      font-size: 13px;
      font-family: monospace;
    }
    button {
      padding: 8px 20px;
      background: #4a9eff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #3a8eef; }
    button:disabled { background: #555; cursor: not-allowed; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
