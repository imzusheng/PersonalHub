name: Publish PersonalHub Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Build Windows installer
        run: npx tsc -p tsconfig.build.json && node scripts/copy-preload.mjs && npx vite build && npx electron-builder --win --x64 --publish never
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/PersonalHub-Setup-*-x64.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
