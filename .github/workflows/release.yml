name: Publish PersonalHub Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Validate tag matches package version
        run: node -e "const version=require('./package.json').version; const expected='v'+version; if(process.env.GITHUB_REF_NAME!==expected){console.error('Tag '+process.env.GITHUB_REF_NAME+' must match package version '+expected); process.exit(1)}"

      - name: Create draft release
        uses: softprops/action-gh-release@v3.0.1
        with:
          draft: true
          generate_release_notes: true

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: mac
            assets: |
              release/PersonalHub-*.dmg
              release/PersonalHub-*.zip
              release/latest-mac.yml
              release/*.blockmap
          - os: windows-2022
            target: win
            assets: |
              release/PersonalHub-Setup-*.exe
              release/latest.yml
              release/*.blockmap

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7.0.0

      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 9

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: node scripts/generate-icons.mjs

      - run: pnpm build

      - name: Build unsigned package
        if: matrix.target == 'win' || secrets.MAC_CSC_LINK == ''
        run: pnpm exec electron-builder --${{ matrix.target }} --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Build signed macOS package
        if: matrix.target == 'mac' && secrets.MAC_CSC_LINK != ''
        run: pnpm exec electron-builder --mac --x64 --publish never
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}

      - name: Upload installer to draft release
        uses: softprops/action-gh-release@v3.0.1
        with:
          draft: true
          files: ${{ matrix.assets }}
          fail_on_unmatched_files: true

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Publish completed release
        uses: softprops/action-gh-release@v3.0.1
