name: Publish PersonalHub Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Create draft release
        uses: softprops/action-gh-release@v3.0.1
        with:
          draft: true
          generate_release_notes: true

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: mac
            asset: release/PersonalHub-*.dmg
          - os: windows-2022
            target: win
            asset: release/PersonalHub-Setup-*.exe

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7.0.0

      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 9

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: node scripts/generate-icons.mjs

      - run: pnpm build

      - run: pnpm exec electron-builder --${{ matrix.target }} --x64 --publish never

      - name: Upload installer to draft release
        uses: softprops/action-gh-release@v3.0.1
        with:
          draft: true
          files: ${{ matrix.asset }}
          fail_on_unmatched_files: true

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Publish completed release
        uses: softprops/action-gh-release@v3.0.1
