name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: mac
            artifact_path: release/PersonalHub-*.dmg
          - os: windows-2022
            target: win
            artifact_path: release/PersonalHub-Setup-*.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (macOS signing)
        if: runner.os == 'macOS'
        run: |
          python3 -m pip install --user setuptools

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: node scripts/generate-icons.mjs

      - run: pnpm build

      - run: npx electron-builder --${{ matrix.target }} --x64 --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: PersonalHub-${{ matrix.target }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
